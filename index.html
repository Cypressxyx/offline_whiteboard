<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Whiteboard - System Design</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg: #f8f9fb;
        --dot: #dde1e7;
        --toolbar-bg: #ffffff;
        --toolbar-shadow: 0 2px 12px rgba(0, 0, 0, 0.08), 0 0 0 1px rgba(0, 0, 0, 0.04);
        --toolbar-title: #1e293b;
        --toolbar-text: #64748b;
        --btn-border: #e2e8f0;
        --btn-text: #475569;
        --btn-hover-bg: #f1f5f9;
        --btn-hover-border: #cbd5e1;
        --box-bg: #ffffff;
        --box-border: #e2e8f0;
        --box-hover-border: #cbd5e1;
        --box-hover-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        --box-text: #334155;
        --box-edit-bg: #f8fafc;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --accent-glow: rgba(59, 130, 246, 0.15);
        --arrow: #94a3b8;
        --draw-preview-bg: rgba(59, 130, 246, 0.04);
        --hint-bg: #ffffff;
        --hint-text: #94a3b8;
        --modal-overlay: rgba(0, 0, 0, 0.4);
        --modal-bg: #ffffff;
        --modal-text: #334155;
        --modal-sub: #64748b;
        --swatch-border: #e2e8f0;
        --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      }

      body {
        font-family: var(--font);
        background: var(--bg);
        overflow: hidden;
        height: 100vh;
        width: 100vw;
        user-select: none;
        transition: background 0.3s;
        touch-action: none;
      }

      #toolbar {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--toolbar-bg);
        border-radius: 12px;
        padding: 8px 16px;
        box-shadow: var(--toolbar-shadow);
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 1000;
        font-size: 14px;
        color: var(--toolbar-text);
        transition:
          background 0.3s,
          color 0.3s;
        max-width: calc(100vw - 24px);
      }

      .btn-icon {
        width: 16px;
        height: 16px;
        fill: currentColor;
        flex-shrink: 0;
      }

      @media (max-width: 600px) {
        #toolbar {
          gap: 6px;
          padding: 6px 10px;
          top: 8px;
        }
        #toolbar .title {
          display: none;
        }
        #toolbar .title + .sep {
          display: none;
        }
        .btn-label {
          display: none;
        }
        #toolbar button {
          padding: 5px 8px;
        }
        #toolbar .sep {
          display: none;
        }
      }

      #toolbar .title {
        font-weight: 600;
        color: var(--toolbar-title);
        letter-spacing: -0.3px;
      }

      #toolbar .sep {
        color: var(--btn-border);
      }

      #toolbar button {
        background: none;
        border: 1px solid var(--btn-border);
        border-radius: 8px;
        padding: 6px 12px;
        cursor: pointer;
        font-size: 13px;
        color: var(--btn-text);
        transition: all 0.15s;
        font-family: var(--font);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      #toolbar button:hover:not(:disabled) {
        background: var(--btn-hover-bg);
        border-color: var(--btn-hover-border);
      }

      #toolbar button:disabled {
        opacity: 0.35;
        cursor: default;
      }

      .icon-btn {
        background: none !important;
        border: none !important;
        padding: 4px 6px !important;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--btn-text);
        transition:
          color 0.15s,
          transform 0.3s;
      }

      .icon-btn:hover {
        color: var(--accent) !important;
        background: none !important;
      }

      .gear-btn:hover {
        transform: rotate(30deg);
      }

      .icon-btn.active {
        color: var(--accent) !important;
        background: var(--accent-glow) !important;
        border-radius: 6px;
      }

      .free-text {
        position: absolute;
        min-width: 20px;
        min-height: 1em;
        color: var(--box-text);
        font-family: var(--font);
        font-size: 15px;
        cursor: move;
        z-index: 2;
        outline: none;
        white-space: pre-wrap;
        line-height: 1.4;
        padding: 2px 4px;
        border-radius: 4px;
      }

      .free-text:focus {
        cursor: text;
        background: var(--box-edit-bg);
        box-shadow: 0 0 0 2px var(--accent-glow);
      }

      .icon-btn svg {
        width: 20px;
        height: 20px;
        fill: currentColor;
      }

      /* Viewport */
      #viewport {
        width: 100%;
        height: 100%;
        position: relative;
        overflow: hidden;
        cursor: crosshair;
        background: var(--bg);
        transition: background 0.3s;
      }

      /* Infinite dot grid rendered via CSS on viewport */
      #viewport {
        --grid-size: 24px;
        background-image: radial-gradient(circle, var(--dot) 1px, transparent 1px);
        background-size: var(--grid-size) var(--grid-size);
        background-position: 0px 0px;
      }

      /* The pannable/zoomable canvas */
      #canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 0;
        height: 0;
        transform-origin: 0 0;
      }

      svg#arrows {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
        pointer-events: none;
        z-index: 1;
      }

      svg#arrows path.arrow-line {
        stroke: var(--arrow);
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrowhead);
        transition: stroke 0.15s;
      }

      svg#arrows path.arrow-clickable {
        stroke: transparent;
        stroke-width: 16;
        fill: none;
        marker-end: none;
        pointer-events: stroke;
        cursor: pointer;
      }

      @keyframes marchingAnts {
        to {
          stroke-dashoffset: -10;
        }
      }

      svg#arrows path.arrow-selected {
        stroke: var(--accent);
        stroke-width: 2;
        stroke-dasharray: 5 3;
        animation: marchingAnts 0.35s linear infinite;
        fill: none;
      }

      svg#arrows circle.arrow-endpoint {
        fill: var(--accent);
        pointer-events: all;
        cursor: grab;
        transition: r 0.1s;
      }

      svg#arrows circle.arrow-endpoint:hover {
        r: 7;
      }

      .box {
        position: absolute;
        min-width: 140px;
        min-height: 70px;
        background: var(--box-bg);
        border: 2px solid var(--box-border);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: grab;
        z-index: 2;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        transition:
          box-shadow 0.2s,
          border-color 0.2s,
          background 0.3s;
      }

      .box:hover {
        box-shadow: var(--box-hover-shadow);
        border-color: var(--box-hover-border);
      }

      .box.selected {
        border-color: transparent;
        box-shadow: var(--box-hover-shadow);
      }

      .box .marching-svg {
        display: none;
        position: absolute;
        inset: -4px;
        width: calc(100% + 8px);
        height: calc(100% + 8px);
        pointer-events: none;
        z-index: 20;
      }

      .box .marching-svg rect {
        fill: none;
        stroke: var(--accent);
        stroke-width: 2;
        stroke-dasharray: 5 3;
        animation: marchingAnts 0.35s linear infinite;
      }

      .box.selected .marching-svg {
        display: block;
      }

      .box.dragging {
        cursor: grabbing;
      }

      .box-text {
        padding: 12px 16px;
        text-align: center;
        font-size: 14px;
        font-weight: 500;
        color: var(--box-text);
        outline: none;
        width: 100%;
        line-height: 1.4;
        word-break: break-word;
        transition: color 0.3s;
      }

      .box-text[contenteditable='true'] {
        cursor: text;
        background: var(--box-edit-bg);
        border-radius: 8px;
        margin: 4px;
        padding: 8px 12px;
      }

      .edge-handle {
        position: absolute;
        background: var(--accent);
        border-radius: 50%;
        width: 12px;
        height: 12px;
        opacity: 0;
        transition:
          opacity 0.15s,
          transform 0.15s;
        cursor: pointer;
        z-index: 10;
        pointer-events: none;
      }

      .box:hover .edge-handle {
        opacity: 1;
        pointer-events: auto;
      }

      .edge-handle:hover {
        transform: scale(1.4);
        background: var(--accent-hover);
      }

      /* Top handles */
      .edge-handle.top-0 {
        top: -6px;
        left: 25%;
        transform: translateX(-50%);
      }
      .edge-handle.top-1 {
        top: -6px;
        left: 50%;
        transform: translateX(-50%);
      }
      .edge-handle.top-2 {
        top: -6px;
        left: 75%;
        transform: translateX(-50%);
      }
      /* Bottom handles */
      .edge-handle.bottom-0 {
        bottom: -6px;
        left: 25%;
        transform: translateX(-50%);
      }
      .edge-handle.bottom-1 {
        bottom: -6px;
        left: 50%;
        transform: translateX(-50%);
      }
      .edge-handle.bottom-2 {
        bottom: -6px;
        left: 75%;
        transform: translateX(-50%);
      }
      /* Left handles */
      .edge-handle.left-0 {
        left: -6px;
        top: 25%;
        transform: translateY(-50%);
      }
      .edge-handle.left-1 {
        left: -6px;
        top: 50%;
        transform: translateY(-50%);
      }
      .edge-handle.left-2 {
        left: -6px;
        top: 75%;
        transform: translateY(-50%);
      }
      /* Right handles */
      .edge-handle.right-0 {
        right: -6px;
        top: 25%;
        transform: translateY(-50%);
      }
      .edge-handle.right-1 {
        right: -6px;
        top: 50%;
        transform: translateY(-50%);
      }
      .edge-handle.right-2 {
        right: -6px;
        top: 75%;
        transform: translateY(-50%);
      }

      .box:hover .edge-handle:hover {
        transform: scale(1.4);
      }

      .box.drop-target {
        border-color: var(--accent) !important;
        box-shadow:
          0 0 0 3px var(--accent-glow),
          var(--box-hover-shadow) !important;
      }

      .draw-preview {
        position: absolute;
        border: 2px dashed var(--accent);
        border-radius: 12px;
        background: var(--draw-preview-bg);
        pointer-events: none;
        z-index: 5;
      }

      .hint {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--hint-bg);
        border-radius: 10px;
        padding: 8px 16px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        font-size: 12px;
        color: var(--hint-text);
        z-index: 1000;
        transition:
          background 0.3s,
          color 0.3s;
        white-space: nowrap;
      }

      /* Buy me a coffee */
      #bmc-link {
        position: fixed;
        bottom: 16px;
        left: 16px;
        background: var(--toolbar-bg);
        border-radius: 10px;
        padding: 6px 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        z-index: 1000;
        text-decoration: none;
        font-size: 12px;
        font-weight: 600;
        color: var(--btn-text);
        display: flex;
        align-items: center;
        gap: 6px;
        transition:
          background 0.3s,
          color 0.15s,
          transform 0.15s;
      }

      #bmc-link:hover {
        color: var(--accent);
        transform: translateY(-1px);
      }

      #bmc-link svg {
        width: 16px;
        height: 16px;
        fill: currentColor;
      }

      /* Zoom controls (bottom right) */
      #zoom-controls {
        position: fixed;
        bottom: 16px;
        right: 16px;
        display: flex;
        align-items: center;
        gap: 4px;
        background: var(--toolbar-bg);
        border-radius: 10px;
        padding: 4px 8px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        z-index: 1000;
        transition: background 0.3s;
      }

      #zoom-controls button {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--btn-text);
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 16px;
        font-weight: 600;
        line-height: 1;
        transition:
          background 0.15s,
          color 0.15s;
        font-family: var(--font);
      }

      #zoom-controls button:hover {
        background: var(--btn-hover-bg);
        color: var(--accent);
      }

      #zoom-level {
        font-size: 12px;
        color: var(--hint-text);
        min-width: 42px;
        text-align: center;
        cursor: pointer;
        padding: 4px 2px;
        border-radius: 4px;
        transition: color 0.15s;
      }

      #zoom-level:hover {
        color: var(--accent);
      }

      /* Panning cursor */
      #viewport.panning {
        cursor: grab;
      }
      #viewport.panning-active {
        cursor: grabbing;
      }

      /* ---- Theme Modal ---- */
      #theme-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: var(--modal-overlay);
        z-index: 9998;
        animation: fadeIn 0.2s;
      }

      #theme-modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--modal-bg);
        border-radius: 16px;
        padding: 28px 32px;
        z-index: 9999;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
        min-width: 520px;
        max-width: 600px;
        animation: scaleIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        transition: background 0.3s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @keyframes scaleIn {
        from {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }

      #theme-modal h2 {
        font-size: 18px;
        font-weight: 700;
        color: var(--modal-text);
        margin-bottom: 4px;
      }

      #theme-modal p {
        font-size: 13px;
        color: var(--modal-sub);
        margin-bottom: 20px;
      }

      .theme-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        max-height: 60vh;
        overflow-y: auto;
        padding-right: 4px;
      }

      .theme-grid::-webkit-scrollbar {
        width: 6px;
      }
      .theme-grid::-webkit-scrollbar-track {
        background: transparent;
      }
      .theme-grid::-webkit-scrollbar-thumb {
        background: var(--btn-border);
        border-radius: 3px;
      }

      .theme-option {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 2px solid var(--swatch-border);
        cursor: pointer;
        transition: all 0.15s;
        background: transparent;
      }

      .theme-option:hover {
        border-color: var(--accent);
        background: var(--draw-preview-bg);
      }

      .theme-option.active {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }

      .theme-swatch {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        border: 1px solid rgba(0, 0, 0, 0.08);
      }

      .theme-swatch-inner {
        width: 16px;
        height: 12px;
        border-radius: 3px;
        border: 1.5px solid;
      }

      .theme-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--modal-text);
      }

      .theme-close {
        position: absolute;
        top: 16px;
        right: 16px;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--modal-sub);
        padding: 4px;
        border-radius: 6px;
        transition: background 0.15s;
        line-height: 0;
      }

      .theme-close:hover {
        background: var(--btn-hover-bg);
      }
      .theme-close svg {
        width: 18px;
        height: 18px;
        fill: currentColor;
      }

      /* ---- Confirm Modal ---- */
      #confirm-modal {
        display: none;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: var(--modal-bg);
        border-radius: 16px;
        padding: 28px 32px;
        z-index: 9999;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.2);
        min-width: 340px;
        max-width: 400px;
        animation: scaleIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        transition: background 0.3s;
        text-align: center;
      }

      #confirm-modal h2 {
        font-size: 18px;
        font-weight: 700;
        color: var(--modal-text);
        margin-bottom: 8px;
      }

      #confirm-modal p {
        font-size: 13px;
        color: var(--modal-sub);
        margin-bottom: 24px;
        line-height: 1.5;
      }

      .confirm-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .confirm-actions button {
        padding: 8px 20px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.15s;
        font-family: var(--font);
        border: 1px solid var(--btn-border);
        background: none;
        color: var(--btn-text);
      }

      .confirm-actions button:hover {
        background: var(--btn-hover-bg);
        border-color: var(--btn-hover-border);
      }

      .confirm-actions .btn-danger {
        background: #ef4444;
        border-color: #ef4444;
        color: #fff;
      }

      .confirm-actions .btn-danger:hover {
        background: #dc2626;
        border-color: #dc2626;
      }

      /* Save menu dropdown */
      .save-wrapper {
        position: relative;
      }

      #save-menu {
        position: absolute;
        top: 100%;
        left: 0;
        margin-top: 4px;
        background: var(--toolbar-bg);
        border-radius: 8px;
        box-shadow: var(--toolbar-shadow);
        z-index: 1001;
        min-width: 160px;
        padding: 4px;
      }

      #save-menu button {
        display: block;
        width: 100%;
        text-align: left;
        padding: 8px 12px;
        border: none !important;
        border-radius: 6px;
        font-size: 13px;
        color: var(--btn-text);
        background: none;
        cursor: pointer;
        font-family: var(--font);
      }

      #save-menu button:hover {
        background: var(--btn-hover-bg) !important;
      }

      /* Share toast */
      #share-toast {
        position: fixed;
        bottom: 60px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--toolbar-bg);
        color: var(--modal-text);
        padding: 10px 20px;
        border-radius: 8px;
        box-shadow: var(--toolbar-shadow);
        font-size: 13px;
        font-family: var(--font);
        z-index: 10000;
        animation: fadeIn 0.2s;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="undo-btn" class="icon-btn" onclick="undo()" title="Undo (Ctrl+Z)" disabled>
        <svg viewBox="0 0 24 24">
          <path
            d="M12.5 8c-2.65 0-5.05 1.04-6.83 2.73L3 8v9h9l-2.83-2.83A7.004 7.004 0 0119 12c0-.35-.02-.7-.07-1.04l1.98-.35A8.97 8.97 0 0112.5 8z"
          />
        </svg>
      </button>
      <button id="redo-btn" class="icon-btn" onclick="redo()" title="Redo (Ctrl+Shift+Z)" disabled>
        <svg viewBox="0 0 24 24">
          <path
            d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16a8.002 8.002 0 017.6-5.5c1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z"
          />
        </svg>
      </button>
      <span class="sep">|</span>
      <button onclick="clearAll()" title="Clear All">
        <svg class="btn-icon" viewBox="0 0 24 24">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
        </svg>
        <span class="btn-label">Clear All</span>
      </button>
      <div class="save-wrapper">
        <button onclick="toggleSaveMenu()" title="Save" id="save-btn">
          <svg class="btn-icon" viewBox="0 0 24 24">
            <path
              d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"
            />
          </svg>
          <span class="btn-label">Save</span>
        </button>
        <div id="save-menu" style="display: none">
          <button
            onclick="
              exportJSON();
              closeSaveMenu();
            "
          >
            Export JSON
          </button>
          <button
            onclick="
              exportSVG();
              closeSaveMenu();
            "
          >
            Export SVG
          </button>
          <button
            onclick="
              shareURL();
              closeSaveMenu();
            "
          >
            Copy Share Link
          </button>
        </div>
      </div>
      <button onclick="importJSON()" title="Load">
        <svg class="btn-icon" viewBox="0 0 24 24">
          <path
            d="M20 6h-8l-2-2H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"
          />
        </svg>
        <span class="btn-label">Load</span>
      </button>
      <span class="sep">|</span>
      <button id="text-mode-btn" class="icon-btn" onclick="toggleTextMode()" title="Text mode (T)">

    <div id="confirm-modal">

    <div id="viewport">

            <marker
              id="arrowhead"
              markerWidth="10"

    <a id="bmc-link" href="https://buymeacoffee.com/bonsaitree92" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24">
        <path
          d="M18.5 9H18V7c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v9c0 2.21 1.79 4 4 4h8c2.21 0 4-1.79 4-4v-1h.5c1.93 0 3.5-1.57 3.5-3.5S20.43 9 18.5 9zM16 16c0 1.1-.9 2-2 2H6c-1.1 0-2-.9-2-2V7h12v9zm2.5-4H18v-1h.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5v-2z"
        />

    <div id="zoom-controls">
      <button onclick="zoomBy(-0.15)" title="Zoom out">-</button>
      <span id="zoom-level" onclick="resetView()" title="Reset zoom">100%</span>
      <button onclick="zoomBy(0.15)" title="Zoom in">+</button>
    </div>

    <div class="hint">
      Scroll to pan &middot; Pinch or Ctrl+Scroll to zoom &middot; Click to place box &middot; Double-click to edit
      &middot; Hover edges for arrows
    </div>

    <script src="whiteboard.js"></script>
    <script src="themes.js"></script>
    <script>
      // ============== CAMERA (Pan & Zoom) ==============
      let panX = 0,
        panY = 0,
        scale = 1;
      const MIN_SCALE = 0.1,
        MAX_SCALE = 5;
      const viewport = document.getElementById('viewport');
      const canvas = document.getElementById('canvas');

      function updateTransform() {
        canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
        const gs = 24 * scale;
        viewport.style.backgroundSize = `${gs}px ${gs}px`;
        viewport.style.backgroundPosition = `${panX}px ${panY}px`;
        document.getElementById('zoom-level').textContent = Math.round(scale * 100) + '%';
      }

      // Override pure functions with stateful wrappers
      {
        const _screenToCanvas = screenToCanvas;
        screenToCanvas = function (sx, sy) {
          return _screenToCanvas(sx, sy, panX, panY, scale);
        };

        const _zoomAt = zoomAt;
        zoomAt = function (cx, cy, delta) {
          const result = _zoomAt(cx, cy, panX, panY, scale, delta);
          panX = result.panX;
          panY = result.panY;
          scale = result.scale;
          updateTransform();
        };

        const _findBoxAt = findBoxAt;
        findBoxAt = function (cx, cy) {
          return _findBoxAt(boxes, cx, cy);
        };
      }

      function zoomBy(delta) {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        zoomAt(cx, cy, delta);
      }

      function resetView() {
        panX = 0;
        panY = 0;
        scale = 1;
        updateTransform();
      }

      // --- Wheel: pan & zoom ---
      viewport.addEventListener(
        'wheel',
        (e) => {
          e.preventDefault();
          if (e.ctrlKey || e.metaKey) {
            // Pinch-to-zoom on trackpad or Ctrl+scroll
            const delta = -e.deltaY * 0.01;
            zoomAt(e.clientX, e.clientY, delta);
          } else {
            // Pan
            panX -= e.deltaX;
            panY -= e.deltaY;
            updateTransform();
          }
        },
        { passive: false },
      );

      // --- Touch: pinch-to-zoom & pan ---
      let touches = {};
      let lastTouchDist = null;
      let lastTouchCenter = null;
      let touchIsPan = false;

      viewport.addEventListener(
        'touchstart',
        (e) => {
          for (const t of e.changedTouches) touches[t.identifier] = { x: t.clientX, y: t.clientY };
          const keys = Object.keys(touches);
          if (keys.length === 2) {
            const [a, b] = keys.map((k) => touches[k]);
            lastTouchDist = Math.hypot(a.x - b.x, a.y - b.y);
            lastTouchCenter = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
            e.preventDefault();
          } else if (keys.length === 1) {
            touchIsPan = false;
          }
        },
        { passive: false },
      );

      viewport.addEventListener(
        'touchmove',
        (e) => {
          for (const t of e.changedTouches) touches[t.identifier] = { x: t.clientX, y: t.clientY };
          const keys = Object.keys(touches);
          if (keys.length === 2) {
            e.preventDefault();
            const [a, b] = keys.map((k) => touches[k]);
            const dist = Math.hypot(a.x - b.x, a.y - b.y);
            const center = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
            if (lastTouchDist) {
              const delta = (dist - lastTouchDist) / lastTouchDist;
              zoomAt(center.x, center.y, delta);
            }
            if (lastTouchCenter) {
              panX += center.x - lastTouchCenter.x;
              panY += center.y - lastTouchCenter.y;
              updateTransform();
            }
            lastTouchDist = dist;
            lastTouchCenter = center;
          }
        },
        { passive: false },
      );

      viewport.addEventListener('touchend', (e) => {
        for (const t of e.changedTouches) delete touches[t.identifier];
        if (Object.keys(touches).length < 2) {
          lastTouchDist = null;
          lastTouchCenter = null;
        }
      });

      viewport.addEventListener('touchcancel', (e) => {
        for (const t of e.changedTouches) delete touches[t.identifier];
        lastTouchDist = null;
        lastTouchCenter = null;
      });

      // --- Middle-mouse or Space+drag to pan ---
      let isPanning = false;
      let panStart = null;
      let spaceHeld = false;

      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && e.target.contentEditable !== 'true' && !e.repeat) {
          e.preventDefault();
          spaceHeld = true;
          viewport.classList.add('panning');
        }
        if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
          e.preventDefault();
          undo();
          return;
        }
        if ((e.metaKey || e.ctrlKey) && (e.key === 'Z' || (e.key === 'z' && e.shiftKey) || e.key === 'y')) {
          e.preventDefault();
          redo();
          return;
        }
        if (e.target.contentEditable === 'true') return;
        if (e.key === 't' || e.key === 'T') {
          toggleTextMode();
          return;
        }
        if ((e.key === 'Delete' || e.key === 'Backspace') && selectedArrowIdx !== null) {
          e.preventDefault();
          arrows.splice(selectedArrowIdx, 1);
          selectedArrowIdx = null;
          renderArrows();
          save();
          return;
        }
        if ((e.key === 'Delete' || e.key === 'Backspace') && selectedBoxId != null) {
          e.preventDefault();
          deleteBox(selectedBoxId);
        }
        if (e.key === 'Escape') closeThemeModal();
      });

      document.addEventListener('keyup', (e) => {
        if (e.code === 'Space') {
          spaceHeld = false;
          if (!isPanning) viewport.classList.remove('panning');
        }
      });

      // THEMES is loaded from themes.js via <script> tag

      let currentTheme = 'light';

      function applyTheme(key) {
        const t = THEMES[key];
        if (!t) return;
        currentTheme = key;
        const r = document.documentElement.style;
        r.setProperty('--bg', t.bg);
        r.setProperty('--dot', t.dot);
        r.setProperty('--toolbar-bg', t.toolbarBg);
        r.setProperty('--toolbar-shadow', t.toolbarShadow);
        r.setProperty('--toolbar-title', t.toolbarTitle);
        r.setProperty('--toolbar-text', t.toolbarText);
        r.setProperty('--btn-border', t.btnBorder);
        r.setProperty('--btn-text', t.btnText);
        r.setProperty('--btn-hover-bg', t.btnHoverBg);
        r.setProperty('--btn-hover-border', t.btnHoverBorder);
        r.setProperty('--box-bg', t.boxBg);
        r.setProperty('--box-border', t.boxBorder);
        r.setProperty('--box-hover-border', t.boxHoverBorder);
        r.setProperty('--box-hover-shadow', t.boxHoverShadow);
        r.setProperty('--box-text', t.boxText);
        r.setProperty('--box-edit-bg', t.boxEditBg);
        r.setProperty('--accent', t.accent);
        r.setProperty('--accent-hover', t.accentHover);
        r.setProperty('--accent-glow', t.accentGlow);
        r.setProperty('--arrow', t.arrow);
        r.setProperty('--draw-preview-bg', t.drawPreviewBg);
        r.setProperty('--hint-bg', t.hintBg);
        r.setProperty('--hint-text', t.hintText);
        r.setProperty('--modal-overlay', t.modalOverlay);
        r.setProperty('--modal-bg', t.modalBg);
        r.setProperty('--modal-text', t.modalText);
        r.setProperty('--modal-sub', t.modalSub);
        r.setProperty('--swatch-border', t.swatchBorder);
        document.querySelector('#arrowhead polygon').setAttribute('fill', t.arrow);
        document.querySelectorAll('.theme-option').forEach((el) => {
          el.classList.toggle('active', el.dataset.theme === key);
        });
        localStorage.setItem('whiteboard-theme', key);
      }

      function buildThemeGrid() {
        const grid = document.getElementById('theme-grid');
        grid.innerHTML = '';
        Object.entries(THEMES).forEach(([key, t]) => {
          const opt = document.createElement('div');
          opt.className = 'theme-option' + (key === currentTheme ? ' active' : '');
          opt.dataset.theme = key;
          opt.innerHTML = `
      <div class="theme-swatch" style="background:${t.swatchBg};">
        <div class="theme-swatch-inner" style="background:${t.swatchBox};border-color:${t.swatchBoxBorder};"></div>
      </div>
      <span class="theme-label">${t.name}</span>
    `;
          opt.addEventListener('click', () => applyTheme(key));
          grid.appendChild(opt);
        });
      }

      function openThemeModal() {
        buildThemeGrid();
        document.getElementById('theme-overlay').style.display = 'block';
        document.getElementById('theme-modal').style.display = 'block';
      }

      function closeThemeModal() {
        document.getElementById('theme-overlay').style.display = 'none';
        document.getElementById('theme-modal').style.display = 'none';
      }

      // ============== WHITEBOARD LOGIC ==============
      const svgArrows = document.getElementById('arrows');

      let boxes = [];
      let arrows = [];
      let nextId = 1;
      let selectedBoxId = null;

      const undoStack = [];
      const redoStack = [];
      const MAX_HISTORY = 50;

      let textMode = false;
      let freeTexts = [];

      let isDrawing = false;
      let drawStart = null; // in canvas coords
      let drawPreview = null;

      let isDragging = false;
      let dragBoxId = null;
      let dragOffset = { x: 0, y: 0 }; // in canvas coords

      let selectedArrowIdx = null;

      // Arrow dragging state (new arrow from handle or reconnecting existing)
      let isArrowDragging = false;
      let arrowFromId = null;
      let arrowFromSide = null;
      let arrowPreviewLine = null;
      let arrowDropTarget = null;
      let arrowReconnecting = null; // { idx, end: 'from'|'to' }

      const DEFAULT_W = 160;
      const DEFAULT_H = 80;
      const ARROW_GAP = 60;

      function createBoxElement(box) {
        const el = document.createElement('div');
        el.className = 'box';
        el.dataset.id = box.id;
        el.style.left = box.x + 'px';
        el.style.top = box.y + 'px';
        el.style.width = box.w + 'px';
        el.style.height = box.h + 'px';

        // Marching ants SVG overlay
        const marchSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        marchSvg.classList.add('marching-svg');
        marchSvg.setAttribute('preserveAspectRatio', 'none');
        const marchRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        marchRect.setAttribute('x', '2');
        marchRect.setAttribute('y', '2');
        marchRect.setAttribute('rx', '14');
        marchRect.setAttribute('ry', '14');
        marchSvg.appendChild(marchRect);
        el.appendChild(marchSvg);

        // Size the rect to match the SVG (updated on layout)
        const updateMarch = () => {
          const w = el.offsetWidth + 8;
          const h = el.offsetHeight + 8;
          marchSvg.setAttribute('viewBox', `0 0 ${w} ${h}`);
          marchRect.setAttribute('width', w - 4);
          marchRect.setAttribute('height', h - 4);
        };
        el._updateMarch = updateMarch;
        requestAnimationFrame(updateMarch);

        const text = document.createElement('div');
        text.className = 'box-text';
        text.textContent = box.text;
        el.appendChild(text);

        ['top', 'right', 'bottom', 'left'].forEach((side) => {
          for (let slot = 0; slot < 3; slot++) {
            const handle = document.createElement('div');
            handle.className = `edge-handle ${side}-${slot}`;
            const sideSlot = `${side}-${slot}`;
            handle.addEventListener('mousedown', (e) => {
              e.stopPropagation();
              startArrowDrag(box.id, sideSlot, e.clientX, e.clientY);
            });
            handle.addEventListener('touchstart', (e) => {
              e.stopPropagation();
              e.preventDefault();
              const t = e.touches[0];
              startArrowDrag(box.id, sideSlot, t.clientX, t.clientY);
            });
            el.appendChild(handle);
          }
        });

        function startEditing() {
          text.contentEditable = 'true';
          text.focus();
          const range = document.createRange();
          range.selectNodeContents(text);
          window.getSelection().removeAllRanges();
          window.getSelection().addRange(range);
        }

        el.addEventListener('dblclick', (e) => {
          e.stopPropagation();
          startEditing();
        });

        // Double-tap for iOS
        let lastTap = 0;
        el.addEventListener('touchend', (e) => {
          if (text.contentEditable === 'true') return;
          const now = Date.now();
          if (now - lastTap < 350) {
            e.preventDefault();
            startEditing();
          }
          lastTap = now;
        });

        text.addEventListener('blur', () => {
          text.contentEditable = 'false';
          box.text = text.textContent || 'New Box';
          if (!text.textContent.trim()) text.textContent = 'New Box';
          save();
        });

        text.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            text.blur();
          }
        });

        // Mouse drag
        el.addEventListener('mousedown', (e) => {
          if (text.contentEditable === 'true') return;
          if (spaceHeld) return; // let pan take over
          e.stopPropagation();
          selectBox(box.id);
          isDragging = true;
          dragBoxId = box.id;
          const cp = screenToCanvas(e.clientX, e.clientY);
          dragOffset.x = cp.x - box.x;
          dragOffset.y = cp.y - box.y;
          el.classList.add('dragging');
        });

        // Touch drag — use a small delay so double-tap can fire first
        let touchDragTimer = null;
        el.addEventListener(
          'touchstart',
          (e) => {
            if (text.contentEditable === 'true') return;
            if (e.touches.length !== 1) return;
            e.stopPropagation();
            const t = e.touches[0];
            const cp = screenToCanvas(t.clientX, t.clientY);
            touchDragTimer = setTimeout(() => {
              selectBox(box.id);
              isDragging = true;
              dragBoxId = box.id;
              dragOffset.x = cp.x - box.x;
              dragOffset.y = cp.y - box.y;
              el.classList.add('dragging');
            }, 150);
          },
          { passive: true },
        );

        el.addEventListener(
          'touchend',
          () => {
            if (touchDragTimer) {
              clearTimeout(touchDragTimer);
              touchDragTimer = null;
            }
          },
          { passive: true },
        );

        canvas.appendChild(el);
        return el;
      }

      function addBox(x, y, w, h, text) {
        const box = { id: nextId++, x, y, w: Math.max(w, 100), h: Math.max(h, 50), text: text || 'New Box' };
        boxes.push(box);
        createBoxElement(box);
        selectBox(box.id);
        save();
        return box;
      }

      function updateDeleteButton() {
        document.getElementById('delete-btn').style.display =
          selectedBoxId !== null || selectedArrowIdx !== null ? '' : 'none';
      }

      function selectBox(id) {
        selectedBoxId = id;
        deselectArrow();
        document.querySelectorAll('.box').forEach((el) => {
          const isSelected = parseInt(el.dataset.id) === id;
          el.classList.toggle('selected', isSelected);
          if (isSelected && el._updateMarch) requestAnimationFrame(el._updateMarch);
        });
        updateDeleteButton();
      }

      function deleteSelected() {
        if (selectedArrowIdx !== null) {
          arrows.splice(selectedArrowIdx, 1);
          selectedArrowIdx = null;
          renderArrows();
          save();
        } else if (selectedBoxId !== null) {
          deleteBox(selectedBoxId);
        }
        updateDeleteButton();
      }

      function deleteBox(id) {
        const el = canvas.querySelector(`.box[data-id="${id}"]`);
        if (el) el.remove();
        boxes = boxes.filter((b) => b.id !== id);
        arrows = arrows.filter((a) => a.from !== id && a.to !== id);
        if (selectedBoxId === id) selectedBoxId = null;
        renderArrows();
        save();
      }

      // --- Arrow drag-to-connect ---
      let arrowPreviewAnchor = null; // { x, y }
      let arrowPreviewDir = null; // 'top'|'bottom'|'left'|'right'

      function startArrowDrag(fromId, side, sx, sy) {
        isArrowDragging = true;
        arrowFromId = fromId;
        arrowFromSide = side;
        arrowDropTarget = null;

        const fromBox = boxes.find((b) => b.id === fromId);
        arrowPreviewAnchor = getAnchor(fromBox, side);
        arrowPreviewDir = side.split('-')[0];

        arrowPreviewLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        arrowPreviewLine.setAttribute('stroke-dasharray', '6,4');
        arrowPreviewLine.setAttribute('opacity', '0.6');
        arrowPreviewLine.classList.add('arrow-line', 'arrow-preview');
        const cp = screenToCanvas(sx, sy);
        arrowPreviewLine.setAttribute('d', buildArrowPath(arrowPreviewAnchor, cp, arrowPreviewDir, arrowPreviewDir));
        svgArrows.appendChild(arrowPreviewLine);
      }

      function updateArrowDrag(sx, sy) {
        if (!isArrowDragging || !arrowPreviewLine) return;
        const cp = screenToCanvas(sx, sy);
        arrowPreviewLine.setAttribute('d', buildArrowPath(arrowPreviewAnchor, cp, arrowPreviewDir, arrowPreviewDir));

        // Highlight drop target
        const hit = findBoxAt(cp.x, cp.y);
        if (hit && hit.id !== arrowFromId) {
          if (arrowDropTarget !== hit.id) {
            clearDropHighlight();
            arrowDropTarget = hit.id;
            const el = canvas.querySelector(`.box[data-id="${hit.id}"]`);
            if (el) el.classList.add('drop-target');
          }
        } else {
          clearDropHighlight();
          arrowDropTarget = null;
        }
      }

      function endArrowDrag(sx, sy) {
        if (!isArrowDragging) return;

        // If reconnecting an existing arrow endpoint
        if (arrowReconnecting) {
          endArrowReconnect(sx, sy);
          return;
        }

        isArrowDragging = false;
        if (arrowPreviewLine) {
          arrowPreviewLine.remove();
          arrowPreviewLine = null;
        }
        clearDropHighlight();

        const fromBox = boxes.find((b) => b.id === arrowFromId);
        if (!fromBox) return;

        const cp = screenToCanvas(sx, sy);
        const hit = findBoxAt(cp.x, cp.y);

        if (hit && hit.id !== arrowFromId) {
          // Connect to existing box
          const toSide = closestSide(hit, cp.x, cp.y);
          arrows.push({ from: arrowFromId, to: hit.id, fromSide: arrowFromSide, toSide: toSide });
        } else {
          // Spawn new box at cursor, offset so the connecting edge aligns with cursor
          const fromDir = arrowFromSide.split('-')[0];
          let nx = cp.x - fromBox.w / 2;
          let ny = cp.y - fromBox.h / 2;
          if (fromDir === 'bottom' || fromDir === 'top') {
            // Arrow exits vertically — place box so its nearest horizontal edge is at cursor
            ny = fromDir === 'bottom' ? cp.y : cp.y - fromBox.h;
          } else {
            // Arrow exits horizontally — place box so its nearest vertical edge is at cursor
            nx = fromDir === 'right' ? cp.x : cp.x - fromBox.w;
          }
          const newBox = addBox(nx, ny, fromBox.w, fromBox.h, 'New Box');
          const toSide = closestSide(newBox, cp.x, cp.y);
          arrows.push({ from: arrowFromId, to: newBox.id, fromSide: arrowFromSide, toSide: toSide });
        }
        renderArrows();
        save();
        arrowFromId = null;
        arrowFromSide = null;
        arrowDropTarget = null;
      }

      // findBoxAt, closestSide loaded from whiteboard.js

      function clearDropHighlight() {
        canvas.querySelectorAll('.box.drop-target').forEach((el) => el.classList.remove('drop-target'));
      }

      // --- Reconnect existing arrow endpoint ---
      function startArrowReconnect(idx, end, sx, sy) {
        const a = arrows[idx];
        if (!a) return;
        arrowReconnecting = { idx, end };
        isArrowDragging = true;
        arrowDropTarget = null;

        // The fixed end is the opposite side
        let fixedBox, fixedSide;
        if (end === 'from') {
          fixedBox = boxes.find((b) => b.id === a.to);
          fixedSide = a.toSide || oppositeSide(a.fromSide);
          arrowFromId = a.to; // use as reference to exclude from drop
        } else {
          fixedBox = boxes.find((b) => b.id === a.from);
          fixedSide = a.fromSide;
          arrowFromId = a.from;
        }

        arrowPreviewAnchor = getAnchor(fixedBox, fixedSide);
        arrowPreviewDir = fixedSide.split('-')[0];
        const cp = screenToCanvas(sx, sy);

        arrowPreviewLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        arrowPreviewLine.setAttribute('stroke-dasharray', '6,4');
        arrowPreviewLine.setAttribute('opacity', '0.6');
        arrowPreviewLine.classList.add('arrow-line', 'arrow-preview');
        arrowPreviewLine.setAttribute('d', buildArrowPath(arrowPreviewAnchor, cp, arrowPreviewDir, arrowPreviewDir));
        svgArrows.appendChild(arrowPreviewLine);

        // Hide the original arrow while reconnecting
        renderArrows();
      }

      function endArrowReconnect(sx, sy) {
        const rc = arrowReconnecting;
        if (!rc) return;
        const a = arrows[rc.idx];
        if (!a) {
          arrowReconnecting = null;
          return;
        }

        const cp = screenToCanvas(sx, sy);
        const hit = findBoxAt(cp.x, cp.y);

        if (hit && hit.id !== arrowFromId) {
          const hitSide = closestSide(hit, cp.x, cp.y);
          if (rc.end === 'from') {
            a.from = hit.id;
            a.fromSide = hitSide;
          } else {
            a.to = hit.id;
            a.toSide = hitSide;
          }
        }
        // If dropped on empty space or same box, keep original

        arrowReconnecting = null;
        isArrowDragging = false;
        arrowFromId = null;
        if (arrowPreviewLine) {
          arrowPreviewLine.remove();
          arrowPreviewLine = null;
        }
        clearDropHighlight();
        renderArrows();
        save();
      }

      // getAnchor, oppositeSide, buildArrowPath loaded from whiteboard.js

      function renderArrows() {
        // Remove all rendered arrow elements (not the preview dashed line)
        svgArrows
          .querySelectorAll('path.arrow-line:not(.arrow-preview), path.arrow-clickable, circle.arrow-endpoint')
          .forEach((l) => l.remove());
        arrows.forEach((a, idx) => {
          const fromBox = boxes.find((b) => b.id === a.from);
          const toBox = boxes.find((b) => b.id === a.to);
          if (!fromBox || !toBox) return;
          const start = getAnchor(fromBox, a.fromSide);
          const endSide = a.toSide || oppositeSide(a.fromSide);
          const end = getAnchor(toBox, endSide);
          const fromDir = a.fromSide.split('-')[0];
          const toDir = endSide.split('-')[0];

          // Hide arrow being reconnected
          const isReconnecting = arrowReconnecting && arrowReconnecting.idx === idx;

          const d = buildArrowPath(start, end, fromDir, toDir);

          // Visible path
          if (!isReconnecting) {
            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', d);
            path.classList.add('arrow-line');
            if (selectedArrowIdx === idx) path.classList.add('arrow-selected');
            svgArrows.appendChild(path);
          }

          // Invisible fat hit area for clicking
          if (isReconnecting) return;
          const hitPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          hitPath.setAttribute('d', d);
          hitPath.classList.add('arrow-clickable');
          hitPath.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            selectArrow(idx);
            const cp = screenToCanvas(e.clientX, e.clientY);
            const dFrom = Math.hypot(cp.x - start.x, cp.y - start.y);
            const dTo = Math.hypot(cp.x - end.x, cp.y - end.y);
            startArrowReconnect(idx, dFrom <= dTo ? 'from' : 'to', e.clientX, e.clientY);
          });
          hitPath.addEventListener('touchstart', (e) => {
            e.stopPropagation();
            selectArrow(idx);
            const t = e.touches[0];
            const cp = screenToCanvas(t.clientX, t.clientY);
            const dFrom = Math.hypot(cp.x - start.x, cp.y - start.y);
            const dTo = Math.hypot(cp.x - end.x, cp.y - end.y);
            startArrowReconnect(idx, dFrom <= dTo ? 'from' : 'to', t.clientX, t.clientY);
          });
          svgArrows.appendChild(hitPath);

          // Draggable endpoint circles on selected arrow
          if (selectedArrowIdx === idx) {
            [
              ['from', start],
              ['to', end],
            ].forEach(([end, pt]) => {
              const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
              circle.setAttribute('cx', pt.x);
              circle.setAttribute('cy', pt.y);
              circle.setAttribute('r', '5');
              circle.classList.add('arrow-endpoint');
              circle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                startArrowReconnect(idx, end, e.clientX, e.clientY);
              });
              circle.addEventListener('touchstart', (e) => {
                e.stopPropagation();
                e.preventDefault();
                const t = e.touches[0];
                startArrowReconnect(idx, end, t.clientX, t.clientY);
              });
              svgArrows.appendChild(circle);
            });
          }
        });
      }

      function selectArrow(idx) {
        selectedArrowIdx = idx;
        selectedBoxId = null;
        document.querySelectorAll('.box').forEach((el) => el.classList.remove('selected'));
        renderArrows();
        updateDeleteButton();
      }

      function deselectArrow() {
        if (selectedArrowIdx !== null) {
          selectedArrowIdx = null;
          renderArrows();
        }
        updateDeleteButton();
      }

      // --- Viewport mouse events ---
      viewport.addEventListener('mousedown', (e) => {
        // Middle mouse or space+click = pan
        if (e.button === 1 || (e.button === 0 && spaceHeld)) {
          e.preventDefault();
          isPanning = true;
          panStart = { x: e.clientX - panX, y: e.clientY - panY };
          viewport.classList.add('panning-active');
          return;
        }

        // Left click on empty canvas
        if (e.button === 0 && e.target === viewport) {
          // If something is selected, just deselect without starting a new box
          if (selectedBoxId !== null || selectedArrowIdx !== null) {
            selectBox(null);
            deselectArrow();
            return;
          }

          selectBox(null);
          deselectArrow();

          // Text mode: place a free text
          if (textMode) {
            const cp = screenToCanvas(e.clientX, e.clientY);
            addFreeText(cp.x, cp.y);
            save();
            return;
          }

          isDrawing = true;
          drawStart = screenToCanvas(e.clientX, e.clientY);
          drawPreview = document.createElement('div');
          drawPreview.className = 'draw-preview';
          canvas.appendChild(drawPreview);
        }
      });

      document.addEventListener('mousemove', (e) => {
        if (isPanning && panStart) {
          panX = e.clientX - panStart.x;
          panY = e.clientY - panStart.y;
          updateTransform();
          return;
        }

        if (isArrowDragging) {
          updateArrowDrag(e.clientX, e.clientY);
          return;
        }

        if (isDrawing && drawStart) {
          const cur = screenToCanvas(e.clientX, e.clientY);
          const x = Math.min(cur.x, drawStart.x);
          const y = Math.min(cur.y, drawStart.y);
          const w = Math.abs(cur.x - drawStart.x);
          const h = Math.abs(cur.y - drawStart.y);
          drawPreview.style.left = x + 'px';
          drawPreview.style.top = y + 'px';
          drawPreview.style.width = w + 'px';
          drawPreview.style.height = h + 'px';
        }

        if (isDragging && dragBoxId != null) {
          const box = boxes.find((b) => b.id === dragBoxId);
          if (!box) return;
          const cp = screenToCanvas(e.clientX, e.clientY);
          box.x = cp.x - dragOffset.x;
          box.y = cp.y - dragOffset.y;
          const el = canvas.querySelector(`.box[data-id="${dragBoxId}"]`);
          if (el) {
            el.style.left = box.x + 'px';
            el.style.top = box.y + 'px';
          }
          renderArrows();
        }
      });

      document.addEventListener('mouseup', (e) => {
        if (isPanning) {
          isPanning = false;
          panStart = null;
          viewport.classList.remove('panning-active');
          if (!spaceHeld) viewport.classList.remove('panning');
          return;
        }

        if (isArrowDragging) {
          endArrowDrag(e.clientX, e.clientY);
          return;
        }

        if (isDrawing && drawStart) {
          const cur = screenToCanvas(e.clientX, e.clientY);
          const x = Math.min(cur.x, drawStart.x);
          const y = Math.min(cur.y, drawStart.y);
          const w = Math.abs(cur.x - drawStart.x);
          const h = Math.abs(cur.y - drawStart.y);
          if (drawPreview) {
            drawPreview.remove();
            drawPreview = null;
          }
          if (w > 20 && h > 20) {
            addBox(x, y, w, h, 'New Box');
          } else if (w < 5 && h < 5) {
            const cp = screenToCanvas(e.clientX, e.clientY);
            addBox(cp.x - DEFAULT_W / 2, cp.y - DEFAULT_H / 2, DEFAULT_W, DEFAULT_H, 'New Box');
          }
          isDrawing = false;
          drawStart = null;
        }

        if (isDragging) {
          isDragging = false;
          const el = canvas.querySelector(`.box[data-id="${dragBoxId}"]`);
          if (el) el.classList.remove('dragging');
          dragBoxId = null;
          save();
        }
      });

      // --- Touch move/end for box dragging and arrow dragging ---
      document.addEventListener(
        'touchmove',
        (e) => {
          if (isArrowDragging && e.touches.length === 1) {
            const t = e.touches[0];
            updateArrowDrag(t.clientX, t.clientY);
            return;
          }
          if (isDragging && dragBoxId != null && e.touches.length === 1) {
            const t = e.touches[0];
            const box = boxes.find((b) => b.id === dragBoxId);
            if (!box) return;
            const cp = screenToCanvas(t.clientX, t.clientY);
            box.x = cp.x - dragOffset.x;
            box.y = cp.y - dragOffset.y;
            const el = canvas.querySelector(`.box[data-id="${dragBoxId}"]`);
            if (el) {
              el.style.left = box.x + 'px';
              el.style.top = box.y + 'px';
            }
            renderArrows();
          }
        },
        { passive: true },
      );

      document.addEventListener('touchend', (e) => {
        if (isArrowDragging) {
          const t = e.changedTouches[0];
          endArrowDrag(t.clientX, t.clientY);
          return;
        }
        if (isDragging) {
          isDragging = false;
          const el = canvas.querySelector(`.box[data-id="${dragBoxId}"]`);
          if (el) el.classList.remove('dragging');
          dragBoxId = null;
          save();
        }
      });

      // --- Persistence ---
      function getSnapshot() {
        return JSON.stringify({ boxes, arrows, nextId, freeTexts });
      }

      let lastSavedSnapshot = getSnapshot();

      function pushUndo() {
        undoStack.push(lastSavedSnapshot);
        if (undoStack.length > MAX_HISTORY) undoStack.shift();
        redoStack.length = 0;
        updateUndoRedoButtons();
      }

      function updateUndoRedoButtons() {
        document.getElementById('undo-btn').disabled = undoStack.length === 0;
        document.getElementById('redo-btn').disabled = redoStack.length === 0;
      }

      function restoreSnapshot(snapshot) {
        const data = JSON.parse(snapshot);
        canvas.querySelectorAll('.box').forEach((el) => el.remove());
        canvas.querySelectorAll('.free-text').forEach((el) => el.remove());
        svgArrows.innerHTML = '';
        boxes = data.boxes || [];
        arrows = data.arrows || [];
        nextId = data.nextId || 1;
        freeTexts = [];
        selectedBoxId = null;
        selectedArrowIdx = null;
        boxes.forEach((b) => createBoxElement(b));
        (data.freeTexts || []).forEach((ft) => addFreeText(ft.x, ft.y, ft.text, ft.id));
        renderArrows();
        localStorage.setItem('whiteboard-data', snapshot);
      }

      function undo() {
        if (undoStack.length === 0) return;
        redoStack.push(getSnapshot());
        restoreSnapshot(undoStack.pop());
        updateUndoRedoButtons();
      }

      function redo() {
        if (redoStack.length === 0) return;
        undoStack.push(getSnapshot());
        restoreSnapshot(redoStack.pop());
        updateUndoRedoButtons();
      }

      function save() {
        pushUndo();
        lastSavedSnapshot = getSnapshot();
        localStorage.setItem('whiteboard-data', lastSavedSnapshot);
      }

      function load() {
        const raw = localStorage.getItem('whiteboard-data');
        if (!raw) return;
        try {
          const data = JSON.parse(raw);
          boxes = data.boxes || [];
          arrows = data.arrows || [];
          nextId = data.nextId || 1;
          freeTexts = [];
          boxes.forEach((b) => createBoxElement(b));
          (data.freeTexts || []).forEach((ft) => addFreeText(ft.x, ft.y, ft.text, ft.id));
          renderArrows();
        } catch (e) {
          console.error('Failed to load:', e);
        }
      }

      // --- Text Mode ---
      function toggleTextMode() {
        textMode = !textMode;
        document.getElementById('text-mode-btn').classList.toggle('active', textMode);
        viewport.style.cursor = textMode ? 'text' : '';
      }

      function addFreeText(x, y, text, id) {
        if (!id) id = 'ft-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
        const ft = { id, x, y, text: text || '' };
        if (!freeTexts.find((t) => t.id === id)) freeTexts.push(ft);

        const el = document.createElement('div');
        el.className = 'free-text';
        el.contentEditable = 'true';
        el.dataset.ftId = id;
        el.style.left = ft.x + 'px';
        el.style.top = ft.y + 'px';
        el.innerText = ft.text;
        canvas.appendChild(el);

        // Auto-focus new text
        if (!text) {
          setTimeout(() => el.focus(), 0);
        }

        // Save on blur
        el.addEventListener('blur', () => {
          const t = freeTexts.find((t) => t.id === id);
          if (t) {
            t.text = el.innerText;
            if (!t.text.trim()) {
              // Remove empty texts
              freeTexts = freeTexts.filter((t) => t.id !== id);
              el.remove();
            }
            save();
          }
        });

        el.addEventListener('keydown', (e) => {
          if (e.key === 'Escape') {
            el.blur();
          }
          e.stopPropagation();
        });

        // Drag support
        let ftDragging = false,
          ftOffset = { x: 0, y: 0 };
        el.addEventListener('mousedown', (e) => {
          if (document.activeElement === el) return; // editing, don't drag
          e.stopPropagation();
          ftDragging = true;
          const cp = screenToCanvas(e.clientX, e.clientY);
          ftOffset.x = cp.x - ft.x;
          ftOffset.y = cp.y - ft.y;

          const onMove = (e2) => {
            if (!ftDragging) return;
            const cp2 = screenToCanvas(e2.clientX, e2.clientY);
            ft.x = cp2.x - ftOffset.x;
            ft.y = cp2.y - ftOffset.y;
            el.style.left = ft.x + 'px';
            el.style.top = ft.y + 'px';
          };
          const onUp = () => {
            ftDragging = false;
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            save();
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });

        return ft;
      }

      function clearAll() {
        document.getElementById('confirm-overlay').style.display = 'block';
        document.getElementById('confirm-modal').style.display = 'block';
      }

      function closeConfirm() {
        document.getElementById('confirm-overlay').style.display = 'none';
        document.getElementById('confirm-modal').style.display = 'none';
      }

      function confirmClear() {
        canvas.querySelectorAll('.box').forEach((el) => el.remove());
        canvas.querySelectorAll('.free-text').forEach((el) => el.remove());
        svgArrows.innerHTML = '';
        boxes = [];
        arrows = [];
        freeTexts = [];
        selectedBoxId = null;
        save();
        closeConfirm();
      }

      function toggleSaveMenu() {
        const menu = document.getElementById('save-menu');
        menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
      }

      function closeSaveMenu() {
        document.getElementById('save-menu').style.display = 'none';
      }

      document.addEventListener('click', function (e) {
        const wrapper = document.querySelector('.save-wrapper');
        if (wrapper && !wrapper.contains(e.target)) closeSaveMenu();
      });

      function exportJSON() {
        const data = JSON.stringify({ boxes, arrows, nextId, freeTexts }, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'whiteboard.json';
        a.click();
        URL.revokeObjectURL(a.href);
      }

      function exportSVG() {
        const svgStr = generateSVG(boxes, arrows, freeTexts);
        const blob = new Blob([svgStr], { type: 'image/svg+xml' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'whiteboard.svg';
        a.click();
        URL.revokeObjectURL(a.href);
      }

      function shareURL() {
        const state = { boxes, arrows, nextId, freeTexts };
        const encoded = encodeState(state);
        const base =
          location.origin && location.origin !== 'null'
            ? location.origin + location.pathname
            : 'https://jfinite.com/whiteboard/';
        const url = base + '#state=' + encoded;
        if (navigator.clipboard) {
          navigator.clipboard.writeText(url).then(function () {
            showToast('Share link copied to clipboard');
          });
        } else {
          prompt('Copy this share link:', url);
        }
      }

      function showToast(msg) {
        const existing = document.getElementById('share-toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.id = 'share-toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(function () {
          toast.remove();
        }, 2500);
      }

      function importJSON() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = (e) => {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = (ev) => {
            try {
              canvas.querySelectorAll('.box').forEach((el) => el.remove());
              canvas.querySelectorAll('.free-text').forEach((el) => el.remove());
              svgArrows.innerHTML = '';
              const data = JSON.parse(ev.target.result);
              boxes = data.boxes || [];
              arrows = data.arrows || [];
              nextId = data.nextId || 1;
              freeTexts = [];
              boxes.forEach((b) => createBoxElement(b));
              (data.freeTexts || []).forEach((ft) => addFreeText(ft.x, ft.y, ft.text, ft.id));
              renderArrows();
              save();
            } catch (err) {
              alert('Invalid file');
            }
          };
          reader.readAsText(file);
        };
        input.click();
      }

      // --- Init ---
      const savedTheme = localStorage.getItem('whiteboard-theme') || 'light';
      applyTheme(savedTheme);

      // Check URL for shared state
      const hashMatch = location.hash.match(/^#state=(.+)/);
      if (hashMatch) {
        try {
          const data = decodeState(hashMatch[1]);
          boxes = data.boxes || [];
          arrows = data.arrows || [];
          nextId = data.nextId || 1;
          freeTexts = [];
          boxes.forEach((b) => createBoxElement(b));
          (data.freeTexts || []).forEach((ft) => addFreeText(ft.x, ft.y, ft.text, ft.id));
          renderArrows();
          lastSavedSnapshot = getSnapshot();
          localStorage.setItem('whiteboard-data', lastSavedSnapshot);
          history.replaceState(null, '', location.pathname);
        } catch (e) {
          load();
        }
      } else {
        load();
      }
      updateTransform();

      // Expose internals for testing
      window._wb = {
        get boxes() {
          return boxes;
        },
        set boxes(v) {
          boxes = v;
        },
        get arrows() {
          return arrows;
        },
        set arrows(v) {
          arrows = v;
        },
        get freeTexts() {
          return freeTexts;
        },
        get nextId() {
          return nextId;
        },
        get selectedBoxId() {
          return selectedBoxId;
        },
        get selectedArrowIdx() {
          return selectedArrowIdx;
        },
        get textMode() {
          return textMode;
        },
        get THEMES() {
          return THEMES;
        },
        addBox,
        deleteBox,
        selectBox,
        selectArrow,
        deselectArrow,
        renderArrows,
        confirmClear,
        applyTheme,
        toggleTextMode,
        addFreeText,
        undo,
        redo,
        save,
        toggleSaveMenu,
        closeSaveMenu,
        exportSVG,
        shareURL,
      };
    </script>
  </body>
</html>
